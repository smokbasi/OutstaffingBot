# Overlay for dev/staging VPS (Linux), including SHARED VPS with vspomni_bot + 3X-UI.
# Run:
#   COMPOSE_PROJECT_NAME=outstaffingbot docker compose \
#     -f docker-compose.yml -f docker-compose.staging.yml up -d
#
# Differences from local dev:
# - postgres/redis not published on 0.0.0.0
# - credentials from .env
# - dedicated Docker network outstaffing_internal
# - restart: always on all services (same intent as vspomni systemd Restart=always)
#
# Port map shared VPS (89.125.25.99) — see docs/SERVER_SECURITY.md section 5:
#   TAKEN vspomni/3x-ui: 443, 433, 2096, 8443-8449, 8765, 8088, 25855 (localhost)
#   OutstaffingBot API: 127.0.0.1:8000 (nginx upstream)
#   Postgres/Redis: internal only; for dev tunnel uncomment ports below

name: outstaffingbot

services:
  postgres:
    restart: always
    ports: !reset []
    # Dev SSH tunnel only — bind localhost, NOT 0.0.0.0:
    # ports:
    #   - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-outstaffing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-outstaffing}
      POSTGRES_DB: ${POSTGRES_DB:-outstaffing}
    networks:
      - outstaffing_internal

  redis:
    restart: always
    ports: !reset []
    # Dev SSH tunnel only:
    # ports:
    #   - "127.0.0.1:6380:6379"
    networks:
      - outstaffing_internal

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - outstaffing_internal
    restart: always

  bot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python -m app.bot.main
    env_file: .env
    environment:
      BOT_RELEASE_NOTES: ${BOT_RELEASE_NOTES:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - outstaffing_internal
    restart: always

networks:
  outstaffing_internal:
    driver: bridge