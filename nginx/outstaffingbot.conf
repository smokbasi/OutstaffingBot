# OutstaffingBot — www dashboard + /api proxy (TLS :443 stream SNI → 127.0.0.1:8451)

server {
    listen 80;
    listen [::]:80;
    server_name outstaffingbot.online www.outstaffingbot.online;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type text/plain;
    }

    location / {
        return 301 https://www.outstaffingbot.online$request_uri;
    }
}

server {
    listen 127.0.0.1:8451 ssl http2;
    listen [::1]:8451 ssl http2;
    server_name outstaffingbot.online www.outstaffingbot.online;

    ssl_certificate /etc/letsencrypt/live/outstaffingbot.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/outstaffingbot.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    if ($host = outstaffingbot.online) {
        return 301 https://www.outstaffingbot.online$request_uri;
    }

    root /opt/outstaffingbot/mini-app/dist;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Optional when api.outstaffingbot.online DNS is ready:
# - cert: certbot certonly --webroot -w /var/www/acme -d api.outstaffingbot.online
# - add SNI: api.outstaffingbot.online → 127.0.0.1:8451
# - server on 127.0.0.1:8451 ssl with location / { proxy_pass http://127.0.0.1:8000; }